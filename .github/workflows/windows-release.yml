name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build portable Windows package
    runs-on: windows-2025
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Show pinned Rust toolchain
        run: rustc --version --verbose

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --locked --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq "openmanic").version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match Cargo version v$version"
          }

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Build portable ZIP and checksum
        run: cargo xtask package-windows

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenManic-windows-x86_64
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/*.zip dist/*.sha256 --clobber
          } else {
            gh release create $tag dist/*.zip dist/*.sha256 --verify-tag --generate-notes --title "OpenManic $tag"
          }
