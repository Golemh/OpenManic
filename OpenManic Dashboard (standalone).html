document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

navCalendar }}\">Calendar<\u002Fdiv>\n        <div sc-camel-on-click=\"{{ goSettings }}\" style=\"{{ navSettings }}\">Settings<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:14px;\">\n      <button sc-camel-on-click=\"{{ togglePause }}\" style=\"{{ s.ghostBtn }}\">{{ pauseLabel }}<\u002Fbutton>\n      <div style=\"display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px; color:#34D399;\">\n        <span style=\"width:8px; height:8px; border-radius:50%; background:#34D399; box-shadow:0 0 10px #34D399; animation:omPulse 2s infinite;\"><\u002Fspan>\n        Monitoring\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:9px; padding-left:2px;\">\n        <span style=\"width:13px; height:13px; border-radius:50%; background:#F5B54A;\"><\u002Fspan>\n        <span style=\"width:13px; height:13px; border-radius:50%; background:#34D399;\"><\u002Fspan>\n        <span style=\"width:13px; height:13px; border-radius:50%; background:#F16C7A;\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"{{ s.body }}\">\n\n    {{ overviewEl }}\n    {{ categoriesEl }}\n    {{ calendarEl }}\n    {{ settingsEl }}\n\n    <sc-if value=\"{{ isTracker }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <div style=\"{{ s.dateHeader }}\">\n      <div style=\"display:flex; align-items:center; gap:15px;\">\n        <div style=\"{{ s.dayNav }}\">\n          <button sc-camel-on-click=\"{{ prevDay }}\" style=\"{{ s.navArrow }}\">‹<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ goToday }}\" style=\"{{ s.todayBtn }}\" title=\"Jump to today\">○<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ nextDay }}\" style=\"{{ s.navArrow }}\">›<\u002Fbutton>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:19px; font-weight:900; color:#F3F6FF; line-height:1.1;\">{{ dateLabel }}<\u002Fdiv>\n          <div style=\"font-size:12px; font-weight:600; color:#7E8AA8; margin-top:2px;\">{{ relLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:9px;\">\n        <div style=\"{{ s.dayStat }}\"><div style=\"{{ s.dayStatK }}\">Day start<\u002Fdiv><div class=\"om-mono\" style=\"{{ s.dayStatV }}\">{{ dayStart }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"{{ s.dayStat }}\"><div style=\"{{ s.dayStatK }}\">Day end<\u002Fdiv><div class=\"om-mono\" style=\"{{ s.dayStatV }}\">{{ dayEnd }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"{{ s.dayStatAccent }}\"><div style=\"{{ s.dayStatK }}\">Duration<\u002Fdiv><div class=\"om-mono\" style=\"{{ s.dayStatVAccent }}\">{{ durationLabel }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ s.panel }}\">\n      <div style=\"display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px;\">\n        <div style=\"display:flex; align-items:center; gap:12px;\">\n          <div style=\"{{ s.panelIcon }}\">◷<\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px; font-weight:800; letter-spacing:1.5px; color:#8A96C0;\">TIMELINE<\u002Fdiv>\n            <div style=\"font-size:14px; font-weight:700; color:#C9D3EE; margin-top:2px;\">Tracked activity &amp; personal schedule<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:9px;\">\n          <button sc-camel-on-click=\"{{ addScheduleHint }}\" style=\"{{ s.softBtn }}\">＋ Add schedule<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ resetView }}\" style=\"{{ s.softBtn }}\">↺ Reset view<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12.5px; font-weight:600; color:#5F6B87; margin-bottom:10px;\">\n        Scroll to zoom · drag the viewfinder window to pan · right-click for options\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\">\n        <div style=\"font-size:11px; font-weight:800; letter-spacing:1.5px; color:#5A6680;\">24-HOUR VIEWFINDER<\u002Fdiv>\n        <div class=\"om-mono\" style=\"{{ s.viewRange }}\">View {{ viewRangeLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      {{ viewfinderEl }}\n\n      <div style=\"margin-top:18px;\">{{ timelineEl }}<\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:18px; margin-top:16px; padding-top:14px; border-top:1px solid #141E33;\">\n        <span style=\"font-size:11px; font-weight:800; letter-spacing:1.2px; color:#5F6B87;\">LEGEND<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:#34D399;\"><span style=\"width:11px; height:11px; border-radius:4px; background:#34D399;\"><\u002Fspan>Active<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:#F16C7A;\"><span style=\"width:11px; height:11px; border-radius:4px; background:#F16C7A;\"><\u002Fspan>Away<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:#6B7794;\"><span style=\"width:11px; height:11px; border-radius:4px; background:#475569;\"><\u002Fspan>Powered off<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:#22D3EE;\"><span style=\"width:14px; height:9px; border:2px solid #22D3EE; border-bottom:none; border-radius:3px 3px 0 0;\"><\u002Fspan>Scheduled<\u002Fspan>\n        <span style=\"font-size:12.5px; font-weight:600; color:#5F6B87; margin-left:auto;\">Recorded <b style=\"color:#B9C4E0;\">{{ recordedLabel }}<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ s.selBanner }}\">\n      <div style=\"display:flex; align-items:center; gap:14px;\">\n        <div style=\"{{ s.selDot }}\"><\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px; font-weight:800; letter-spacing:1.2px; color:#7E8AA8;\">CURRENT SELECTION<\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:900; color:#F3F6FF; margin-top:1px;\">{{ selTitle }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:22px;\">\n        <div style=\"text-align:right;\">\n          <div style=\"font-size:11px; font-weight:700; color:#7E8AA8;\">Active time<\u002Fdiv>\n          <div class=\"om-mono\" style=\"{{ s.selTotal }}\">{{ selTotalLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ resetSelection }}\" style=\"{{ s.softBtn }}\">Clear selection<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ s.grid }}\">\n      <div style=\"{{ s.card }}\">\n        <div style=\"{{ s.cardHead }}\">CATEGORY DISTRIBUTION<\u002Fdiv>\n        <div style=\"font-size:12.5px; font-weight:600; color:#5F6B87; margin-top:-6px; margin-bottom:8px;\">{{ donutSub }}<\u002Fdiv>\n        {{ donutEl }}\n      <\u002Fdiv>\n\n      <div style=\"{{ s.card }}\">\n        <div style=\"{{ s.cardHead }}\">APP USAGE<\u002Fdiv>\n        <div style=\"font-size:12.5px; font-weight:600; color:#5F6B87; margin-top:-6px; margin-bottom:14px;\">Share of active time<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:13px;\">\n          <sc-for list=\"{{ appRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n            <div sc-camel-on-click=\"{{ row.onClick }}\" style=\"{{ row.wrap }}\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;\">\n                <div style=\"display:flex; align-items:center; gap:9px;\">\n                  <span style=\"{{ row.dot }}\"><\u002Fspan>\n                  <span style=\"font-size:13.5px; font-weight:700; color:#DDE4F5;\">{{ row.name }}<\u002Fspan>\n                <\u002Fdiv>\n                <span class=\"om-mono\" style=\"font-size:12.5px; font-weight:500; color:#8A96C0;\">{{ row.dur }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"{{ s.track }}\"><div style=\"{{ row.bar }}\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"{{ s.card }}\">\n        <div style=\"{{ s.cardHead }}\">FOCUS vs BREAK<\u002Fdiv>\n        <div style=\"font-size:12.5px; font-weight:600; color:#5F6B87; margin-top:-6px; margin-bottom:8px;\">Active against away time<\u002Fdiv>\n        {{ focusRatioEl }}\n      <\u002Fdiv>\n\n      <div style=\"{{ s.card }}\">\n        <div style=\"{{ s.cardHead }}\">TIME DISTRIBUTION<\u002Fdiv>\n        <div style=\"font-size:12.5px; font-weight:600; color:#5F6B87; margin-top:-6px; margin-bottom:14px;\">By category<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:11px;\">\n          <sc-for list=\"{{ catRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div sc-camel-on-click=\"{{ row.onClick }}\" style=\"{{ row.wrap }}\">\n              <div style=\"display:flex; align-items:center; gap:9px; flex:1; min-width:0;\">\n                <span style=\"{{ row.dot }}\"><\u002Fspan>\n                <span style=\"font-size:13.5px; font-weight:700; color:#DDE4F5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ row.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <span class=\"om-mono\" style=\"font-size:12.5px; font-weight:500; color:#8A96C0; white-space:nowrap;\">{{ row.dur }}<\u002Fspan>\n              <span style=\"{{ row.pctPill }}\">{{ row.pct }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"{{ s.card }}\">\n        <div style=\"{{ s.cardHead }}\">FOCUS SESSION<\u002Fdiv>\n        <div style=\"font-size:12.5px; font-weight:600; color:#5F6B87; margin-top:-6px; margin-bottom:14px;\">Schedule a focus block on your calendar<\u002Fdiv>\n        <div style=\"display:flex; gap:8px; margin-bottom:14px;\">\n          <button sc-camel-on-click=\"{{ focus25 }}\" style=\"{{ s.focusChip25 }}\">25 min<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ focus50 }}\" style=\"{{ s.focusChip50 }}\">50 min<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ focus90 }}\" style=\"{{ s.focusChip90 }}\">90 min<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"{{ s.focusClock }}\">\n          <div class=\"om-mono\" style=\"font-size:44px; font-weight:500; color:#F3F6FF; letter-spacing:2px; line-height:1;\">{{ focusClock }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; font-weight:700; color:#7E8AA8; margin-top:8px;\">{{ focusHint }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ scheduleFocus }}\" style=\"{{ s.focusBtn }}\">{{ focusBtnLabel }}<\u002Fbutton>\n        <div style=\"font-size:11.5px; font-weight:600; color:#5F6B87; margin-top:10px; text-align:center;\">Blocks appear as a bracket on the timeline &amp; sync to Calendar.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <\u002Fsc-if>\n\n    <div style=\"height:20px;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  \n  {{ colorPickerEl }}\n  {{ menuEl }}\n  {{ modalEl }}\n  {{ toastEl }}\n  {{ tipEl }}\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:1180}}\">\nconst h = React.createElement;\nconst DAY = 86400;\n\nconst CATS = {\n  communication:{name:'Communication', color:'#3FC5C0'},\n  development:  {name:'Development',    color:'#5B8DEF'},\n  web:          {name:'Web Browsing',   color:'#9B7EF0'},\n  productivity: {name:'Productivity',   color:'#4FB0F5'},\n  gaming:       {name:'Gaming',         color:'#EC6A9C'},\n  design:       {name:'Design',         color:'#C77DEE'},\n  ai:           {name:'AI Assistants',  color:'#7B8CF4'},\n  utility:      {name:'Utilities',      color:'#E0A96D'},\n  idle:         {name:'Unknown',        color:'#3A4763'},\n};\nconst APPS = [\n  ['discord','Discord','communication'], ['slack','Slack','communication'],\n  ['codex','Codex','development'], ['vscode','VS Code','development'],\n  ['chrome','Google Chrome','web'], ['zen','Zen','web'],\n  ['rize','Rize','productivity'], ['openmanic','OpenManic','productivity'],\n  ['spire','Slay the Spire 2','gaming'], ['steam','Steam','gaming'],\n  ['figma','Figma','design'], ['claude','Claude','ai'],\n  ['explorer','Windows Explorer','utility'], ['terminal','Windows Terminal','utility'],\n];\nconst APPCOLORS = { discord:'#5865F2', slack:'#E01E5A', codex:'#10A37F', vscode:'#3EA0E8', chrome:'#F4B400', zen:'#F76F53', rize:'#6C5CE7', openmanic:'#8C7BFF', spire:'#C0392B', steam:'#66C0F4', figma:'#F24E1E', claude:'#D97757', explorer:'#FFC83D', terminal:'#4EC9B0' };\nconst APPMAP = {}; APPS.forEach(a => APPMAP[a[0]] = {id:a[0], name:a[1], cat:a[2], color: APPCOLORS[a[0]] || CATS[a[2]].color});\nconst NOISE = 60; // seconds; below this = noise, excluded from the timeline (kept in stats)\nconst ACT = { active:'#34D399', away:'#F16C7A', off:'#475569' };\nconst FOCUS_CATS = { development:1, ai:1, design:1, productivity:1 };\nconst DISTRACT_CATS = { gaming:1 };\nconst RATES = { development:95, ai:95, design:80, communication:50, productivity:60, web:30, gaming:0, utility:40 };\nconst DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];\n\nfunction mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}\nfunction shade(hex, p){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; if(p<0){const f=1+p;r*=f;g*=f;b*=f;}else{r+=(255-r)*p;g+=(255-g)*p;b+=(255-b)*p;} return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')'; }\nfunction cellGrad(hex){ return 'linear-gradient(180deg,'+shade(hex,-0.26)+' 0%,'+shade(hex,-0.04)+' 62%,'+shade(hex,0.09)+' 100%)'; }\nfunction hexToRgb(hex){ hex=(hex||'').replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); const n=parseInt(hex||'0',16)||0; return {r:(n>>16)&255, g:(n>>8)&255, b:n&255}; }\nfunction rgbToHex(r,g,b){ const c=v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0'); return '#'+(c(r)+c(g)+c(b)).toUpperCase(); }\nfunction th_card(th){ return { background:th.cardBg, border:'1px solid '+th.border, borderRadius:th.radius, padding:th.pad, boxShadow:'0 8px 30px rgba(0,0,0,.35)' }; }\nfunction fmt(sec){ sec=Math.max(0,Math.round(sec)); const hh=Math.floor(sec/3600), mm=Math.floor(sec%3600/60), ss=sec%60; if(hh>0) return hh+'h '+mm+'m'; if(mm>0) return mm+'m '+ss+'s'; return ss+'s'; }\nfunction clock(sec){ const hh=Math.floor(sec/3600)%24, mm=Math.floor(sec%3600/60); const ap=hh<12?'AM':'PM'; let h12=hh%12; if(h12===0)h12=12; return h12+':'+String(mm).padStart(2,'0')+' '+ap; }\n\nfunction buildDay(seed){\n  const rnd = mulberry32(seed);\n  const segs = [];\n  let t = 8*3600 + Math.floor(rnd()*3600); // start 8-9am\n  const end = 17*3600 + Math.floor(rnd()*3.5*3600); // end 5-8:30pm\n  const weights = [ ['codex',5],['vscode',4],['chrome',5],['discord',4],['slack',2],['claude',3],['figma',2],['zen',2],['rize',1],['openmanic',1],['spire',3],['steam',1],['explorer',1],['terminal',1] ];\n  const pool = []; weights.forEach(([id,w])=>{ for(let i=0;i<w;i++) pool.push(id); });\n  while(t < end){\n    const roll = rnd();\n    if(roll < 0.12){ // away / break\n      const d = 120 + Math.floor(rnd()*900);\n      segs.push({start:t, end:Math.min(t+d,end), state:'away'}); t += d;\n    } else if(roll < 0.17){ // powered off gap\n      const d = 300 + Math.floor(rnd()*2400);\n      segs.push({start:t, end:Math.min(t+d,end), state:'off'}); t += d;\n    } else {\n      const app = pool[Math.floor(rnd()*pool.length)];\n      const d = 180 + Math.floor(rnd()*2100);\n      segs.push({start:t, end:Math.min(t+d,end), state:'active', app}); t += d;\n    }\n  }\n  return { segs, first: segs.length?segs[0].start:0, last: segs.length?segs[segs.length-1].end:0 };\n}\nfunction seedFor(off){ return Math.abs(100 + off*37 + (off<0?9999:0)) + 7; }\nfunction dayTotals(off){ const {segs}=buildDay(seedFor(off)); let a=0; segs.forEach(s=>{ if(s.state==='active') a+=s.end-s.start; }); return a; }\n\nclass Component extends DCLogic {\n  constructor(p){\n    super(p);\n    const base = new Date(2026,6,21,0,0,0);\n    this.state = {\n      dir: 'studio',\n      screen: 'tracker',\n      customFrom: -13, customTo: 0,\n      overviewMode: 'days', ovStack: [],\n      settings: { monitoring:true, afkThreshold:3, minInterval:60, redactPrivate:true, screenshots:false, breakReminders:true, workLimit:8, weekStart:'mon', theme:'studio', autostart:true },\n      offset: 0,\n      viewStart: 8*3600, viewEnd: 19*3600,\n      sel: {mode:'viewport'},\n      paused: false,\n      schedules: [],\n      focusMin: 25,\n      menu: null,      // {x,y}\n      modal: null,     // {start,end,name}\n      toast: null,\n      dispTotal: 0,\n      tip: null,\n      catColors: {},\n      colorPicker: null,   // {id,x,y}\n      calMode: 'day',\n      catSearch: '',\n      catFilter: 'all',\n      appCat: {},          // app override -> catId or null(untracked)\n      dragPreview: null, // {a,b} timeline range preview\n      vfDragPreview: null,\n    };\n    this._base = base;\n    this._data = this.load(0);\n    this._raf = null;\n  }\n  load(offset){ return buildDay(seedFor(offset)); }\n  catColor(id){ return (this.state.catColors && this.state.catColors[id]) || (CATS[id]?CATS[id].color:'#3A4763'); }\n  componentDidMount(){ this.recalcTween(); }\n  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); this.clearDoc(); }\n\n  // ---------- date helpers ----------\n  curDate(){ const d = new Date(this._base); d.setDate(d.getDate()+this.state.offset); return d; }\n  dateLabel(){ return this.curDate().toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'}); }\n  relLabel(){ const o=this.state.offset; if(o===0) return 'Today'; if(o===-1) return 'Yesterday'; if(o===1) return 'Tomorrow'; return (o<0? Math.abs(o)+' days ago' : 'in '+o+' days'); }\n\n  setDay(offset){ this._data = this.load(offset); const {first,last}=this._data; this.setState({offset, sel:{mode:'viewport'}, viewStart: Math.max(0, first-1800), viewEnd: Math.min(DAY, last+1800), schedules:[]}, ()=>this.recalcTween()); }\n\n  // ---------- selection filtering ----------\n  minDur(){ return this.state.settings.minInterval; }\n  visibleSegs(){ const {viewStart,viewEnd}=this.state; const min=this.minDur(); return this._data.segs.filter(s=> s.end-s.start>=min && s.end>viewStart && s.start<viewEnd).map(s=>({...s, start:Math.max(s.start,viewStart), end:Math.min(s.end,viewEnd)})); }\n  filtered(){\n    const sel=this.state.sel; const segs=this.visibleSegs();\n    return segs.filter(s=>{\n      if(sel.mode==='category'){ return s.state==='active' && APPMAP[s.app] && APPMAP[s.app].cat===sel.id; }\n      if(sel.mode==='app'){ return s.state==='active' && s.app===sel.id; }\n      if(sel.mode==='range'){ return s.start>=sel.a-1 && s.end<=sel.b+1; }\n      return true;\n    });\n  }\n  selActive(){ return this.filtered().filter(s=>s.state==='active'); }\n  selTotal(){ let t=0; this.selActive().forEach(s=> t+=s.end-s.start); return t; }\n  selTitle(){ const sel=this.state.sel; if(sel.mode==='category') return CATS[sel.id].name; if(sel.mode==='app') return APPMAP[sel.id].name; if(sel.mode==='range') return 'Custom range · '+clock(sel.a)+'–'+clock(sel.b); return 'Whole view window'; }\n  selColor(){ const sel=this.state.sel; if(sel.mode==='category') return this.catColor(sel.id); if(sel.mode==='app') return APPMAP[sel.id].color; return '#6754FF'; }\n\n  recalcTween(){ this.tween(this.state.dispTotal, this.selTotal()); }\n  tween(from,to){ if(this._raf) cancelAnimationFrame(this._raf); const dur=450, t0=performance.now(); const step=(now)=>{ const k=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-k,3); this.setState({dispTotal: from+(to-from)*e}); if(k<1) this._raf=requestAnimationFrame(step); }; this._raf=requestAnimati
